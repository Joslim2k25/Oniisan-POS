<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Oniisan Kitchen Display</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',sans-serif;background:#111;color:#fff;min-height:100vh;overflow-x:hidden}

/* TOP BAR */
.topbar{background:#000;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:2px solid #222;position:sticky;top:0;z-index:100}
.topbar-brand{font-size:16px;font-weight:900;color:#fff;letter-spacing:2px}
.topbar-brand span{color:#c0392b}
.topbar-right{display:flex;align-items:center;gap:10px}
.badge{font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px}
.badge-new{background:#c0392b;color:#fff}
.badge-cooking{background:#c8900a;color:#fff}
.badge-done{background:#1e8449;color:#fff}
.clock{font-size:13px;font-weight:700;color:#888;font-family:monospace}
.refresh-btn{background:#222;color:#888;border:1px solid #333;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer}
.refresh-btn:active{background:#333}

/* FILTER TABS */
.filter-bar{background:#0a0a0a;padding:8px 12px;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid #222}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid #333;background:transparent;color:#666;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s}
.filter-btn.active{border-color:#c0392b;color:#fff;background:#c0392b}
.filter-btn.cooking-btn.active{border-color:#c8900a;background:#c8900a}
.filter-btn.done-btn.active{border-color:#1e8449;background:#1e8449}
.filter-btn.all-btn.active{border-color:#555;background:#333;color:#fff}

/* SOUND TOGGLE */
.sound-btn{background:#222;color:#fbbf24;border:1px solid #444;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:12px}

/* TICKET */
.ticket{border-radius:14px;overflow:hidden;display:flex;flex-direction:column;min-height:180px;transition:all .2s;border:2px solid transparent}
.ticket.new{background:#1a0a0a;border-color:#c0392b}
.ticket.cooking{background:#1a1200;border-color:#c8900a}
.ticket.done{background:#0a1a0a;border-color:#1e8449;opacity:.7}

/* TICKET HEADER */
.ticket-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.ticket-head.new{background:rgba(192,57,43,.3)}
.ticket-head.cooking{background:rgba(200,144,10,.3)}
.ticket-head.done{background:rgba(30,132,73,.3)}
.ticket-table{font-size:16px;font-weight:900}
.ticket-time{font-size:11px;color:#888;font-weight:700}
.ticket-or{font-size:10px;color:#555;margin-top:1px}
.status-pill{font-size:9px;font-weight:900;padding:4px 10px;border-radius:20px;letter-spacing:.5px}
.status-pill.new{background:#c0392b;color:#fff}
.status-pill.cooking{background:#c8900a;color:#000}
.status-pill.done{background:#1e8449;color:#fff}

/* ELAPSED TIMER */
.elapsed{font-size:11px;font-weight:800;padding:3px 8px;border-radius:6px}
.elapsed.ok{color:#4ade80}
.elapsed.warn{color:#fbbf24}
.elapsed.late{color:#f87171;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ITEMS */
.ticket-items{flex:1;padding:10px 14px}
.ticket-item{display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px}
.ticket-item:last-child{border-bottom:none}
.ticket-item:hover{background:rgba(255,255,255,.05);border-radius:6px;padding-left:4px}
.item-qty{color:#fbbf24;font-weight:900;font-size:15px;min-width:28px}
.item-name{color:#ddd;font-weight:600;flex:1;line-height:1.3}
.item-note{font-size:10px;color:#888;display:block;margin-top:2px}

/* FOOTER BUTTONS */
.ticket-foot{padding:10px 12px;display:flex;gap:8px}
.bump-btn{flex:1;padding:12px 8px;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.bump-btn:active{transform:scale(.95)}
.bump-btn.start{background:#c8900a;color:#000}
.bump-btn.done{background:#1e8449;color:#fff}
.bump-btn.recall{background:#333;color:#888;font-size:11px}
.bump-btn.completed{background:#2a2a2a;color:#555;cursor:default}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 20px;grid-column:1/-1}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:.3}
.empty-text{font-size:16px;color:#555;font-weight:700}

/* NEW ORDER FLASH */
@keyframes flash{0%{box-shadow:0 0 0 0 rgba(192,57,43,.6)}70%{box-shadow:0 0 0 20px rgba(192,57,43,0)}100%{box-shadow:0 0 0 0 rgba(192,57,43,0)}}
.ticket.new.flash-new{animation:flash 1s ease-out}

/* LOADING */
.loading{text-align:center;padding:60px;grid-column:1/-1;color:#555;font-weight:700;font-size:14px}

/* CHATBOT */
.chat-fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:#c0392b;color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chat-fab:active{transform:scale(.9)}
.chat-fab .badge{position:absolute;top:-4px;right:-4px;background:#fbbf24;color:#000;font-size:10px;font-weight:900;width:18px;height:18px;border-radius:50%;display:none;align-items:center;justify-content:center}
.chat-window{position:fixed;bottom:84px;right:20px;width:320px;max-height:480px;background:#1a1a1a;border-radius:16px;border:1px solid #333;box-shadow:0 8px 40px rgba(0,0,0,.5);z-index:200;display:none;flex-direction:column;overflow:hidden}
.chat-window.open{display:flex}
.chat-head{background:#c0392b;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.chat-head-title{font-size:13px;font-weight:800;color:#fff}
.chat-head-sub{font-size:10px;color:rgba(255,255,255,.7)}
.chat-close{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0;line-height:1}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;max-height:340px}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.msg{max-width:85%;padding:8px 12px;border-radius:12px;font-size:12px;line-height:1.5}
.msg.bot{background:#2a2a2a;color:#ddd;align-self:flex-start;border-bottom-left-radius:4px}
.msg.user{background:#c0392b;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.typing{background:#2a2a2a;color:#888}
.chat-input-wrap{padding:10px;border-top:1px solid #333;display:flex;gap:8px}
.chat-input{flex:1;background:#2a2a2a;border:1px solid #444;border-radius:8px;color:#fff;padding:8px 10px;font-size:12px;font-family:inherit;outline:none}
.chat-input:focus{border-color:#c0392b}
.chat-send{background:#c0392b;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer}
.quick-btns{display:flex;flex-wrap:wrap;gap:6px;padding:0 12px 8px}
.quick-btn{background:#2a2a2a;color:#aaa;border:1px solid #333;border-radius:20px;padding:5px 10px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap}
.quick-btn:hover{border-color:#c0392b;color:#fff}

/* STATS BAR */
.stats-bar{background:#0a0a0a;padding:8px 16px;display:flex;gap:16px;border-bottom:1px solid #222;overflow-x:auto}
.stats-bar::-webkit-scrollbar{display:none}
.stat-item{flex-shrink:0;text-align:center}
.stat-num{font-size:20px;font-weight:900}
.stat-lbl{font-size:9px;color:#555;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.stat-num.red{color:#c0392b}
.stat-num.gold{color:#c8900a}
.stat-num.green{color:#1e8449}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand"><span>ONIISAN</span> KITCHEN</div>
  <div class="topbar-right">
    <span class="clock" id="clock">00:00:00</span>
    <button class="sound-btn" onclick="toggleSound()" id="soundBtn">🔔 Sound ON</button>
    <button class="refresh-btn" onclick="loadOrders()">🔄</button>
    <button onclick="goBackToLogin()" style="background:#c0392b;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer">← Logout</button>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-num red" id="statNew">0</div><div class="stat-lbl">New</div></div>
  <div class="stat-item"><div class="stat-num gold" id="statCooking">0</div><div class="stat-lbl">Cooking</div></div>
  <div class="stat-item"><div class="stat-num green" id="statDone">0</div><div class="stat-lbl">Done</div></div>
  <div class="stat-item"><div class="stat-num" id="statTotal" style="color:#888">0</div><div class="stat-lbl">Total Today</div></div>
  <div class="stat-item" style="margin-left:auto"><div class="stat-num" id="statAvgTime" style="color:#60a5fa">—</div><div class="stat-lbl">Avg Cook Time</div></div>
</div>

<!-- FILTER TABS -->
<div class="filter-bar">
  <button class="filter-btn all-btn active" onclick="setFilter('active')" id="f-active">🔴🟡 Active</button>
  <button class="filter-btn" onclick="setFilter('new')" id="f-new" style="border-color:#c0392b;color:#c0392b">🔴 New</button>
  <button class="filter-btn cooking-btn" onclick="setFilter('cooking')" id="f-cooking">🟡 Cooking</button>
  <button class="filter-btn done-btn" onclick="setFilter('done')" id="f-done">🟢 Done</button>
  <button class="filter-btn all-btn" onclick="setFilter('all')" id="f-all">All</button>
</div>

<!-- TICKET GRID -->
<div class="grid" id="grid">
  <div class="loading">Loading orders...</div>
</div>

<!-- AUDIO for new order alert -->
<audio id="alertSound" preload="auto">
  <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhS0p3o7uwlWpOTm+gs6yXcVFNZJKuq5x5V1BbhKmpn394V1GAp6ahn4R4Wk1+oqahn4R4Wk1+oqahn4R4Wk1+oqah"/>
</audio>

<!-- KITCHEN CHATBOT -->
<button class="chat-fab" onclick="toggleChat()" id="chatFab">
  🤖
  <div class="badge" id="chatBadge">1</div>
</button>

<div class="chat-window" id="chatWindow">
  <div class="chat-head">
    <div>
      <div class="chat-head-title">🤖 Kitchen Assistant</div>
      <div class="chat-head-sub">Ask me about inventory, orders & recipes</div>
    </div>
    <button class="chat-close" onclick="toggleChat()">×</button>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="msg bot">👋 Hello! I'm your Kitchen Assistant. Ask me about:<br/>• Inventory stocks<br/>• Pending orders<br/>• Recipe ingredients</div>
  </div>
  <div class="quick-btns" id="quickBtns">
    <button class="quick-btn" onclick="askBot('How many pending orders?')">📋 Pending orders</button>
    <button class="quick-btn" onclick="askBot('What items are low stock?')">⚠️ Low stock</button>
    <button class="quick-btn" onclick="askBot('How many orders done today?')">✅ Done today</button>
  </div>
  <div class="chat-input-wrap">
    <input class="chat-input" id="chatInput" placeholder="Ask something..." 
      onkeydown="if(event.key==='Enter')sendChat()"/>
    <button class="chat-send" onclick="sendChat()">➤</button>
  </div>
</div>

<script>
const SUPA_URL='https://edbneihfxiwkvczjecei.supabase.co';
const SUPA_KEY='sb_publishable_OuSaDAf2MbGYBPjBIkkkjg_TQGByWrZ';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

let allOrders=[];
let currentFilter='all';
let soundOn=true;
let knownIds=new Set();
let autoRefreshTimer=null;

// ── Go back to login ──
function goBackToLogin(){
  const base=window.location.href.substring(0,window.location.href.lastIndexOf('/')+1);
  window.location.href=base+'index.html';
}

// ── Clock ──
function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=
    String(now.getHours()).padStart(2,'0')+':'+
    String(now.getMinutes()).padStart(2,'0')+':'+
    String(now.getSeconds()).padStart(2,'0');
}
setInterval(updateClock,1000);updateClock();

// ── Sound ──
function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('soundBtn').textContent=soundOn?'🔔 Sound ON':'🔕 Sound OFF';
}
function playAlert(){
  if(!soundOn)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880,ctx.currentTime);
    osc.frequency.setValueAtTime(660,ctx.currentTime+0.1);
    osc.frequency.setValueAtTime(880,ctx.currentTime+0.2);
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.4);
  }catch(e){}
}

// ── Filter ──
function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('f-'+f)?.classList.add('active');
  renderGrid();
}

// ── Load Orders from Supabase ──
async function loadOrders(){
  const today=new Date().toISOString().slice(0,10);
  const{data,error}=await sb.from('transactions')
    .select('*')
    .eq('is_voided',false)
    .gte('ts',today+'T00:00:00.000Z')
    .lte('ts',today+'T23:59:59.999Z')
    .order('ts',{ascending:false});

  if(error){console.error(error);return;}

  const orders=data||[];

  // Detect new orders
  let hasNew=false;
  orders.forEach(o=>{
    if(!knownIds.has(o.id)&&o.kitchen_status==='new'){hasNew=true;}
    knownIds.add(o.id);
  });
  if(hasNew&&allOrders.length>0) playAlert();

  allOrders=orders;
  updateStats();
  renderGrid();
}

// ── Stats ──
function updateStats(){
  const newCount=allOrders.filter(o=>!o.kitchen_status||o.kitchen_status==='new').length;
  const cookCount=allOrders.filter(o=>o.kitchen_status==='cooking').length;
  const doneCount=allOrders.filter(o=>o.kitchen_status==='done').length;
  document.getElementById('statNew').textContent=newCount;
  document.getElementById('statCooking').textContent=cookCount;
  document.getElementById('statDone').textContent=doneCount;
  document.getElementById('statTotal').textContent=allOrders.length;

  // Avg cook time (done orders)
  const done=allOrders.filter(o=>o.kitchen_status==='done'&&o.kitchen_done_at&&o.ts);
  if(done.length){
    const avg=done.reduce((s,o)=>{
      const diff=(new Date(o.kitchen_done_at)-new Date(o.ts))/60000;
      return s+diff;
    },0)/done.length;
    document.getElementById('statAvgTime').textContent=avg.toFixed(0)+'min';
  }
}

// ── Elapsed Time ──
function getElapsed(ts){
  const mins=Math.round((Date.now()-new Date(ts).getTime())/60000);
  const cls=mins<10?'ok':mins<25?'warn':'late';
  const label=mins<60?mins+'m':(Math.floor(mins/60)+'h'+mins%60+'m');
  const nearTimeout=mins>=35&&mins<TIMEOUT_MINS;
  const autoLabel=nearTimeout?label+' ⚠️':mins>=TIMEOUT_MINS?'AUTO✓':label;
  return{cls,label:autoLabel,mins};
}

// ── Render Grid ──
function renderGrid(){
  const grid=document.getElementById('grid');
  let filtered=allOrders;
  if(currentFilter==='active') filtered=allOrders.filter(o=>!o.kitchen_status||o.kitchen_status==='new'||o.kitchen_status==='cooking');
  else if(currentFilter==='new') filtered=allOrders.filter(o=>!o.kitchen_status||o.kitchen_status==='new');
  else if(currentFilter==='cooking') filtered=allOrders.filter(o=>o.kitchen_status==='cooking');
  else if(currentFilter==='done') filtered=allOrders.filter(o=>o.kitchen_status==='done');

  if(!filtered.length){
    const msg=currentFilter==='active'?'No active orders — all clear! ✅':
              currentFilter==='all'?'No orders today yet':'No '+currentFilter+' orders';
    grid.innerHTML=`<div class="empty"><div class="empty-icon">${currentFilter==='active'?'✅':'🍽️'}</div><div class="empty-text">${msg}</div></div>`;
    return;
  }

  // Sort: new first, then cooking, then done
  const order={new:0,cooking:1,done:2};
  filtered.sort((a,b)=>{
    const sa=order[a.kitchen_status||'new']??0;
    const sb2=order[b.kitchen_status||'new']??0;
    if(sa!==sb2)return sa-sb2;
    return new Date(a.ts)-new Date(b.ts); // oldest first within same status
  });

  grid.innerHTML=filtered.map(o=>{
    const status=o.kitchen_status||'new';
    const elapsed=getElapsed(o.ts);
    const items=o.items||[];
    const timeStr=new Date(o.ts).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});

    const footBtn=status==='new'
      ?`<button class="bump-btn start" onclick="bumpStatus('${o.id}','cooking')">🍳 Start Cooking</button>`
      :status==='cooking'
      ?`<button class="bump-btn done" onclick="bumpStatus('${o.id}','done')">✅ Mark Done</button>
        <button class="bump-btn recall" onclick="bumpStatus('${o.id}','new')" style="flex:0 0 auto;padding:12px 10px">↩️</button>`
      :`<button class="bump-btn completed" disabled>✅ Completed</button>
        <button class="bump-btn recall" onclick="bumpStatus('${o.id}','cooking')" style="flex:0 0 auto;padding:12px 10px;font-size:11px">↩️ Recall</button>`;

    return `<div class="ticket ${status}" id="ticket-${o.id}">
      <div class="ticket-head ${status}">
        <div>
          <div class="ticket-table">${o.table_name||'Table ?'}</div>
          <div class="ticket-or">${o.or_num||''} · ${timeStr}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="status-pill ${status}">${status==='new'?'NEW':status==='cooking'?'COOKING':'DONE'}</span>
          <span class="elapsed ${elapsed.cls}">${elapsed.label}</span>
        </div>
      </div>
      <div class="ticket-items" id="items-${o.id}">
        ${items.map((i,idx)=>`
        <div class="ticket-item" id="item-${o.id}-${idx}" onclick="toggleItem('${o.id}',${idx},${items.length})"
          style="cursor:pointer;transition:all .2s">
          <div style="width:24px;height:24px;border-radius:6px;border:2px solid #444;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s" id="check-${o.id}-${idx}">
            <span style="display:none;color:#1e8449;font-size:14px;font-weight:900">✓</span>
          </div>
          <span class="item-qty">×${i.qty}</span>
          <span class="item-name" id="name-${o.id}-${idx}">${i.name}${i.desc?`<span class="item-note">${i.desc}</span>`:''}</span>
        </div>`).join('')}
        ${!items.length?'<div style="color:#555;font-size:12px;padding:8px 0">No items</div>':''}
        <div style="font-size:10px;color:#555;text-align:right;margin-top:6px;font-weight:700" id="progress-${o.id}">
          0 / ${items.length} done
        </div>
      </div>
      <div style="padding:0 12px;margin-bottom:4px">
        <span style="font-size:10px;color:#555;font-weight:700">${o.payment_method?.toUpperCase()||'CASH'}</span>
        ${o.cashier_name?`<span style="font-size:10px;color:#555"> · ${o.cashier_name}</span>`:''}
      </div>
      <div class="ticket-foot">${footBtn}</div>
    </div>`;
  }).join('');

  // Update elapsed timers every minute
  clearInterval(autoRefreshTimer);
  autoRefreshTimer=setInterval(()=>renderGrid(),30000);
}

// ── Per-item tracking ──
const checkedItems={}; // {orderId: Set of checked indices}

function toggleItem(orderId, idx, total){
  if(!checkedItems[orderId]) checkedItems[orderId]=new Set();
  const set=checkedItems[orderId];
  const checkEl=document.getElementById(`check-${orderId}-${idx}`);
  const nameEl=document.getElementById(`name-${orderId}-${idx}`);
  const itemEl=document.getElementById(`item-${orderId}-${idx}`);
  const progressEl=document.getElementById(`progress-${orderId}`);

  if(set.has(idx)){
    // Uncheck
    set.delete(idx);
    checkEl.style.background='transparent';
    checkEl.style.borderColor='#444';
    checkEl.querySelector('span').style.display='none';
    nameEl.style.textDecoration='none';
    nameEl.style.color='#ddd';
    itemEl.style.opacity='1';
  } else {
    // Check
    set.add(idx);
    checkEl.style.background='#1e8449';
    checkEl.style.borderColor='#1e8449';
    checkEl.querySelector('span').style.display='block';
    nameEl.style.textDecoration='line-through';
    nameEl.style.color='#555';
    itemEl.style.opacity='.6';
  }

  const doneCount=set.size;
  if(progressEl) progressEl.textContent=`${doneCount} / ${total} done`;

  // If all items checked — auto bump to done!
  if(doneCount>=total){
    setTimeout(()=>bumpStatus(orderId,'done'),500);
  } else if(doneCount>0){
    // Auto start cooking if not yet started
    const o=allOrders.find(x=>x.id===orderId);
    if(o&&(!o.kitchen_status||o.kitchen_status==='new')){
      bumpStatus(orderId,'cooking');
    }
  }
}

// ── Bump Status ──
async function bumpStatus(id,newStatus){
  const btn=document.querySelector(`#ticket-${id} .bump-btn`);
  if(btn){btn.disabled=true;btn.textContent='Saving...';}

  const updateData={kitchen_status:newStatus};
  if(newStatus==='cooking') updateData.kitchen_started_at=new Date().toISOString();
  if(newStatus==='done') updateData.kitchen_done_at=new Date().toISOString();

  const{error}=await sb.from('transactions').update(updateData).eq('id',id);

  if(!error){
    const o=allOrders.find(x=>x.id===id);
    if(o){
      o.kitchen_status=newStatus;
      if(newStatus==='cooking') o.kitchen_started_at=updateData.kitchen_started_at;
      if(newStatus==='done') o.kitchen_done_at=updateData.kitchen_done_at;
    }
    updateStats();

    if(newStatus==='done'&&(currentFilter==='active'||currentFilter==='new'||currentFilter==='cooking')){
      // Flash green then fade out after 4 seconds
      const ticket=document.getElementById('ticket-'+id);
      if(ticket){
        ticket.style.transition='opacity 1s ease';
        ticket.style.background='#0a2a0a';
        ticket.style.borderColor='#1e8449';
        ticket.querySelector('.ticket-head').style.background='rgba(30,132,73,.4)';
        ticket.querySelector('.ticket-foot').innerHTML='<div style="width:100%;text-align:center;color:#1e8449;font-weight:800;font-size:13px;padding:8px">✅ DONE — Removing in 4s...</div>';
        setTimeout(()=>{
          ticket.style.opacity='0';
          setTimeout(()=>{
            // Remove from local array
            allOrders=allOrders.filter(x=>x.id!==id);
            // Add to done list silently
            o&&(o.kitchen_status='done');
            allOrders.push(o);
            renderGrid();
            updateStats();
          },1000);
        },4000);
      }
    } else {
      renderGrid();
    }
  } else {
    if(btn){btn.disabled=false;btn.textContent='Error — Retry';}
    console.error(error);
  }
}

// ── Auto Refresh every 15 seconds ──
setInterval(loadOrders, 15000);

// ── Auto-complete orders older than 40 minutes ──
const TIMEOUT_MINS=40;

function showKitchenToast(msg){
  let t=document.getElementById('kitchenToast');
  if(!t){
    t=document.createElement('div');
    t.id='kitchenToast';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#c0392b;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;display:none;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',4000);
}

async function autoCompleteOldOrders(){
  const now=Date.now();
  const oldActive=allOrders.filter(o=>{
    if(o.kitchen_status==='done')return false;
    const ageMin=(now-new Date(o.ts).getTime())/60000;
    return ageMin>=TIMEOUT_MINS;
  });
  if(!oldActive.length)return;
  for(const o of oldActive){
    await sb.from('transactions').update({
      kitchen_status:'done',
      kitchen_done_at:new Date().toISOString()
    }).eq('id',o.id);
    o.kitchen_status='done';
    o.kitchen_done_at=new Date().toISOString();
  }
  showKitchenToast('⏰ '+oldActive.length+' order(s) auto-completed ('+TIMEOUT_MINS+' min timeout)');
  updateStats();
  renderGrid();
}

// Check every minute for timed-out orders
setInterval(autoCompleteOldOrders, 60000);

// ── Realtime subscription ──
try{
  sb.channel('kitchen-orders')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'transactions'},()=>{
      loadOrders();
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'transactions'},()=>{
      loadOrders();
    })
    .subscribe();
}catch(e){console.log('Realtime not available, using polling');}

// ── Init ──
setFilter('active');
loadOrders();

// ══════ KITCHEN CHATBOT ══════
let chatOpen=false;

function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chatWindow').classList.toggle('open',chatOpen);
  document.getElementById('chatFab').textContent=chatOpen?'×':'🤖';
  document.getElementById('chatBadge').style.display='none';
  if(chatOpen) document.getElementById('chatInput').focus();
}

function addMsg(text,type='bot'){
  const msgs=document.getElementById('chatMessages');
  const div=document.createElement('div');
  div.className='msg '+type;
  div.innerHTML=text;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return div;
}

function sendChat(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text)return;
  addMsg(text,'user');
  input.value='';
  askBot(text);
}

async function askBot(question){
  const typing=addMsg('🤖 Thinking...','msg bot typing');
  const q=question.toLowerCase();

  try{
    // PENDING ORDERS
    if(q.includes('pending')||q.includes('order')||q.includes('queue')||q.includes('new')){
      const newOrders=allOrders.filter(o=>!o.kitchen_status||o.kitchen_status==='new');
      const cooking=allOrders.filter(o=>o.kitchen_status==='cooking');
      typing.remove();
      addMsg(`📋 <strong>${newOrders.length} pending</strong> orders, <strong>${cooking.length} cooking</strong> right now.${newOrders.length>0?'<br/>Oldest: '+new Date(newOrders[newOrders.length-1]?.ts).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}):''}`)
      return;
    }

    // DONE TODAY
    if(q.includes('done')||q.includes('completed')||q.includes('finish')){
      const done=allOrders.filter(o=>o.kitchen_status==='done');
      typing.remove();
      addMsg(`✅ <strong>${done.length} orders</strong> done today out of ${allOrders.length} total.`);
      return;
    }

    // LOW STOCK
    if(q.includes('low')||q.includes('stock')||q.includes('kulang')||q.includes('maubusan')){
      const{data:inv}=await sb.from('inventory').select('name,quantity,reorder_level,unit').eq('is_active',true).eq('branch','SM Bicutan');
      const low=(inv||[]).filter(i=>i.reorder_level>0&&i.quantity<=i.reorder_level);
      typing.remove();
      if(low.length===0){
        addMsg('✅ All stocks are sufficient! No low stock items.');
      } else {
        addMsg('⚠️ <strong>Low stock items:</strong><br/>'+low.map(i=>`• ${i.name}: <strong>${i.quantity} ${i.unit||'pcs'}</strong> (reorder at ${i.reorder_level})`).join('<br/>'));
      }
      return;
    }

    // SPECIFIC ITEM STOCK
    const stockMatch=q.match(/(?:stock|marami|ilang|how much|how many)[^a-z]*(.+)|(.+)(?:\s+stock|\s+left|\s+pa)/i);
    if(stockMatch||q.includes('inventory')){
      const searchTerm=(stockMatch?.[1]||stockMatch?.[2]||q.replace(/stock|inventory|left|pa|ilang|marami/gi,'')).trim();
      if(searchTerm.length>2){
        const{data:inv}=await sb.from('inventory').select('name,quantity,unit').eq('is_active',true).ilike('name','%'+searchTerm+'%');
        typing.remove();
        if(inv&&inv.length){
          addMsg('📦 <strong>Stock levels:</strong><br/>'+inv.map(i=>`• ${i.name}: <strong>${i.quantity} ${i.unit||'pcs'}</strong>`).join('<br/>'));
        } else {
          addMsg(`❓ Could not find "${searchTerm}" in inventory. Try a different keyword.`);
        }
        return;
      }
    }

    // ALL INVENTORY
    if(q.includes('lahat')||q.includes('all inventory')||q.includes('all stock')){
      const{data:inv}=await sb.from('inventory').select('name,quantity,unit').eq('is_active',true).eq('branch','SM Bicutan').order('name');
      typing.remove();
      addMsg('📦 <strong>All stocks:</strong><br/>'+(inv||[]).map(i=>`• ${i.name}: ${i.quantity} ${i.unit||'pcs'}`).join('<br/>'));
      return;
    }

    // RECIPE/INGREDIENTS
    if(q.includes('recipe')||q.includes('ingredient')||q.includes('sangkap')||q.includes('gawa')){
      const searchTerm=q.replace(/recipe|ingredient|sangkap|gaano|gawa|ng|ang/gi,'').trim();
      const{data:prods}=await sb.from('products').select('id,name').ilike('name','%'+searchTerm+'%').limit(3);
      if(prods&&prods.length){
        const prod=prods[0];
        const{data:ingredients}=await sb.from('product_ingredients').select('inventory_item_name,quantity_used,unit').eq('product_id',prod.id);
        typing.remove();
        if(ingredients&&ingredients.length){
          addMsg(`🍱 <strong>${prod.name}</strong> ingredients:<br/>`+ingredients.map(i=>`• ${i.inventory_item_name}: ${i.quantity_used} ${i.unit||'pcs'}`).join('<br/>'));
        } else {
          addMsg(`🍱 <strong>${prod.name}</strong> — no recipe set yet. Ask admin to set it up in Admin → Recipes.`);
        }
      } else {
        typing.remove();
        addMsg('❓ Product not found. Try: "recipe ng Large Lemonade"');
      }
      return;
    }

    // HELP
    typing.remove();
    addMsg(`🤖 I can help you with:<br/>
• <strong>Orders:</strong> "How many pending orders?"<br/>
• <strong>Stock:</strong> "Stock ng lemon?" or "Low stock items"<br/>
• <strong>Recipe:</strong> "Recipe ng Large Lemonade"<br/>
• <strong>Done:</strong> "How many done today?"`);

  }catch(e){
    typing.remove();
    addMsg('❌ Error: '+e.message);
  }
}
